name: Playwright E2E

# Runs the web E2E suite on three triggers:
#   - pull_request / push to main  → gate every change
#   - workflow_run after "Naveen Bharat" → chained post-build smoke so the same
#     commit that produced an APK also has its web surface verified. The job
#     status (green/red) IS the pass/fail report; the HTML report uploads on red.
on:
  pull_request:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Naveen Bharat"]
    types: [completed]

permissions:
  contents: read

jobs:
  e2e:
    # For the chained (workflow_run) leg, only run when the parent build passed —
    # a failed APK build shouldn't spawn a confusing "E2E failed" on top of it.
    # PR/push events always run (they have no workflow_run payload).
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      E2E_EMAIL: ${{ secrets.MAESTRO_EMAIL }}
      E2E_PASSWORD: ${{ secrets.MAESTRO_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      # Pin Node from .nvmrc so the webServer (npm run build / npm run start →
      # node server/index.js) runs on the same Node the app targets, instead of
      # whatever ubuntu-latest ships that week. Every other workflow pins Node;
      # this one previously relied on the undeclared runner default.
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify @playwright/test is declared
        run: |
          node -e "
            const p = require('./package.json');
            const dep = (p.devDependencies && p.devDependencies['@playwright/test'])
                     || (p.dependencies && p.dependencies['@playwright/test']);
            if (!dep) {
              console.error('::error::@playwright/test is missing from package.json. Run: bun add -d @playwright/test');
              process.exit(1);
            }
            console.log('@playwright/test found:', dep);
          "
          test -x ./node_modules/.bin/playwright || {
            echo '::error::playwright binary missing from node_modules after install';
            exit 1;
          }

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Build web assets
        run: bun run build

      - name: Run Playwright tests (Chromium projects only)
        # CI installs Chromium only above. Running every configured project would
        # fail on Firefox/WebKit browser executables after the webServer starts.
        # Run only release-safe specs in CI. Legacy admin/auth/payment specs use
        # hardcoded demo credentials and seeded data assumptions; they are kept
        # for local/manual work but should not make every push red.
        run: >-
          ./node_modules/.bin/playwright test
          e2e/smoke.spec.ts
          e2e/breadcrumb-back.spec.ts
          e2e/exit-hint.spec.ts
          e2e/safe-area.spec.ts
          e2e/pdf-offline.spec.ts
          e2e/receipts-rls.spec.ts
          --project=chromium --project=mobile-chrome --project=android-pixel7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 1
